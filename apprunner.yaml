version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install --upgrade pip
      - pip3 install -r requirements.txt

run:
  runtime-version: 3.11
  command: python3 app.py
  network:
    port: 8000
    env: PORT
  env:
    - name: HOST
      value: "0.0.0.0"
    - name: WAITRESS_THREADS
      value: "8"
